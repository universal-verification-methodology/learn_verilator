title: Offline capstone
footer: learn_verilator — offline verilator example
slides:
- type: title
  title: Offline capstone
  subtitle: Browser sketches taught lint, coverage, and metrics, they do not compile
    a DUT with Verilator
  notes: 'Browser sketches taught lint, coverage, and metrics—they do not compile
    a DUT with Verilator. This module is Track A only: you build and run the in-course
    and-gate hello on your machine. You leave with a command line you can repeat—change
    directory, make run, read pass or fail. No browser lab required here—just the
    live toolchain.'
- type: bullets
  title: In-course verilator-hello
  bullets:
  - The monorepo ships a minimal Verilator example beside this curriculum
  - No UVM and no cocotb, just Verilator, make, and a binary you execute
  - Prerequisites are Verilator on your path plus a C++ toolchain
  - Read the hello README for the exact layout before you run
  notes: 'The monorepo ships a minimal Verilator example beside this curriculum: a
    Makefile, a small and-gate DUT, and a C++ testbench harness. No UVM and no cocotb—just
    Verilator, make, and a binary you execute. Prerequisites are Verilator on your
    path plus a C++ toolchain. Read the hello README for the exact layout before you
    run.'
- type: bullets
  title: Offline workflow
  bullets:
  - Open examples/verilator-hello next to this course
  - Change into that folder
  - Run make run
  - Watch compile and link finish, then stdout showing the AND truth table
  - Capture the command and the pass or fail line in your notes
  - If something fails, record the stage, compile, link, or run, and the first error
    line
  notes: Open examples/verilator-hello next to this course. Change into that folder.
    Run make run—the Makefile invokes Verilator to compile the DUT and harness, links
    a binary under obj_dir, and runs it. Watch compile and link finish, then stdout
    showing the AND truth table. Capture the command and the pass or fail line in
    your notes. If something fails, record the stage—compile, link, or run—and the
    first error line.
- type: code
  title: Offline workflow — try these
  code: 'cd courses/learn_verilator/examples/verilator-hello

    make run

    '
  notes: ''
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not substitute a browser lab for this offline requirement
  - Make must run from the hello folder that owns the Makefile
  - A sketch pass is not a Verilator pass, offline needs a real binary on your path
  - The first compile can take a minute; later rebuilds reuse objects
  - If Verilator is missing, install it before blaming RTL
  notes: Do not substitute a browser lab for this offline requirement. Make must run
    from the hello folder that owns the Makefile—the wrong directory fails quietly.
    A sketch pass is not a Verilator pass—offline needs a real binary on your path.
    The first compile can take a minute; later rebuilds reuse objects. If Verilator
    is missing, install it before blaming RTL.
- type: bullets
  title: Your turn
  bullets:
  - Complete the offline checklist
  - 'Optional stretch: produce a short trace from the same example'
  - When you are ready, take the short quiz, then continue to the wrap module
  notes: 'Complete the offline checklist: one real build and run from examples/verilator-hello,
    commands and outcome recorded. Optional stretch: produce a short trace from the
    same example. When you are ready, take the short quiz, then continue to the wrap
    module.'
